# background_image ~/Pictures/wallpaper/clay-banks.jpg
# background_image ~/Pictures/wallpaper/black_kali.jpeg
# background_image ~/Pictures/wallpaper/blue_kali.png
background_image ~/Pictures/wallpaper/images.png

include ~/.config/kitty/themes/blueish2.conf

background_image_layout cscaled
# background_image scaling=fit

confirm_os_window_close     0
# selection_foreground        none
# selection_background        none

# Include pywal colors


font_family                 JetBrainsMono Nerd Font
font_size	                14
bold_font                   auto
italic_font                 auto
bold_italic_font            auto

remember_window_size        no
initial_window_width        950
initial_window_height       500
cursor_blink_interval       0.5
cursor_stop_blinking_after  1
scrollback_lines            2000
wheel_scroll_min_lines      1
enable_audio_bell           no
window_padding_width        0
hide_window_decorations     yes

# dynamic_background_opacity  yes
# background_tint             0.9
# dim_opacity 0


map ctrl+semicolon send_text all \x1b

cursor_trail 3
cursor_trail_decay 0.2 0.3
cursor_trail_start_threshold 3

